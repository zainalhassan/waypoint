services:
  db:
    image: postgres:16-alpine
    container_name: waypoint-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: waypoint
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: waypoint
    volumes:
      - waypoint_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waypoint -d waypoint"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: waypoint-migrate
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waypoint-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    entrypoint: ["node", "server.js"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  waypoint_pg_data:
